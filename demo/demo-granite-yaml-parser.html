<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>granite-yaml-parser demo</title>

  <!-- Resolves the `js-yaml` bare import when served without a build step
       (e.g. on GitHub Pages). Locally, web-dev-server resolves it instead. -->
  <script type="importmap">
    {
      "imports": {
        "js-yaml": "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.mjs"
      }
    }
  </script>
  <script type="module" src="../granite-yaml-parser.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 550px;
      margin: 0 auto;
      padding: 1rem;
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      min-height: 12rem;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #f5f5f5;
      padding: 0.5rem;
      min-height: 3rem;
    }
  </style>
</head>

<body>
  <h1><code>granite-yaml-parser</code></h1>
  <p><a href="./index.html">← All demos</a></p>

  <h3>Basic usage</h3>
  <p>Edit the YAML below, the parsed object updates live.</p>

  <textarea id="input" spellcheck="false">aString: 'This is a string'
aNumber: 42
anotherString: |
  This is a multiline
  string
yetAnotherString: >
  This is another multiline
  string</textarea>

  <granite-yaml-parser id="parser"></granite-yaml-parser>

  <h3>Parsed object</h3>
  <pre id="output">(waiting for YAML)</pre>

  <h3>Multi-document source</h3>
  <p>With the <code>multi-document</code> attribute, the parsed object is
    <code>{ documents: [...] }</code>.</p>

  <granite-yaml-parser id="multi-parser" multi-document></granite-yaml-parser>

  <pre id="multi-output">(waiting for YAML)</pre>

  <script>
    const parser = document.getElementById('parser');
    const input = document.getElementById('input');
    const output = document.getElementById('output');

    parser.addEventListener('yaml-parsed', (evt) => {
      output.textContent = JSON.stringify(evt.detail.obj, null, 2);
    });
    parser.addEventListener('yaml-error', (evt) => {
      output.textContent = `Parse error: ${evt.detail.error.message}`;
    });

    input.addEventListener('input', () => { parser.yaml = input.value; });

    const multiParser = document.getElementById('multi-parser');
    const multiOutput = document.getElementById('multi-output');

    multiParser.addEventListener('yaml-parsed', (evt) => {
      multiOutput.textContent = JSON.stringify(evt.detail.obj, null, 2);
    });

    // Wait for the element definition before driving it from script
    customElements.whenDefined('granite-yaml-parser').then(() => {
      parser.yaml = input.value;
      multiParser.yaml = `---
aString: This is a string
aNumber: 42
---
aString: Oh yeah, yet a string
`;
    });
  </script>
</body>
</html>
