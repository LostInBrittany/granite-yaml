<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>granite-yaml-remote-parser demo</title>

  <!-- Resolves the `js-yaml` bare import when served without a build step
       (e.g. on GitHub Pages). Locally, web-dev-server resolves it instead. -->
  <script type="importmap">
    {
      "imports": {
        "js-yaml": "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.mjs"
      }
    }
  </script>
  <script type="module" src="../granite-yaml-remote-parser.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 550px;
      margin: 0 auto;
      padding: 1rem;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #f5f5f5;
      padding: 0.5rem;
      min-height: 3rem;
    }
  </style>
</head>

<body>
  <h1><code>granite-yaml-remote-parser</code></h1>
  <p><a href="./index.html">← All demos</a></p>

  <h3>Basic usage</h3>
  <p>Fetches <a href="./assets/aYamlFile.yml"><code>assets/aYamlFile.yml</code></a>
    and parses it.</p>

  <granite-yaml-remote-parser
      id="remote-parser"
      url="./assets/aYamlFile.yml"
      auto></granite-yaml-remote-parser>

  <pre id="output">(fetching...)</pre>

  <h3>Multi-document source</h3>
  <p>Fetches <a href="./assets/aMultiDocumentYamlFile.yml"><code>assets/aMultiDocumentYamlFile.yml</code></a>
    and parses it with the <code>multi-document</code> attribute.</p>

  <granite-yaml-remote-parser
      id="multi-remote-parser"
      url="./assets/aMultiDocumentYamlFile.yml"
      auto
      multi-document></granite-yaml-remote-parser>

  <pre id="multi-output">(fetching...)</pre>

  <script>
    for (const [parserId, outputId] of [
      ['remote-parser', 'output'],
      ['multi-remote-parser', 'multi-output'],
    ]) {
      const parser = document.getElementById(parserId);
      const output = document.getElementById(outputId);
      parser.addEventListener('yaml-parsed', (evt) => {
        output.textContent = JSON.stringify(evt.detail.obj, null, 2);
      });
      parser.addEventListener('yaml-error', (evt) => {
        output.textContent = `Error: ${evt.detail.error.message}`;
      });
    }
  </script>
</body>
</html>
